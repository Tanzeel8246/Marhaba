openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: مرحبا سویٹس اینڈ بیکرز API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product categories
  - name: products
    description: Bakery products
  - name: orders
    description: Customer orders
  - name: banners
    description: Homepage banners
  - name: blackout-dates
    description: Delivery blackout dates
  - name: coupons
    description: Coupon codes
  - name: admin
    description: Admin authentication

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Categories ────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  # ── Products ──────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: visible
          in: query
          schema:
            type: boolean
        - name: available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/popular:
    get:
      operationId: listPopularProducts
      tags: [products]
      summary: List most popular products by order count
      responses:
        "200":
          description: Popular products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /products/{id}/toggle-visibility:
    patch:
      operationId: toggleProductVisibility
      tags: [products]
      summary: Toggle product visibility (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}/toggle-availability:
    patch:
      operationId: toggleProductAvailability
      tags: [products]
      summary: Toggle product availability (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}/related:
    get:
      operationId: getRelatedProducts
      tags: [products]
      summary: Get related products by category
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Related products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  # ── Orders ────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OrderStatus"
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order (customer checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/summary:
    get:
      operationId: getOrdersSummary
      tags: [orders]
      summary: Dashboard analytics summary
      responses:
        "200":
          description: Orders summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersSummary"

  /orders/calendar:
    get:
      operationId: getOrdersCalendar
      tags: [orders]
      summary: Orders grouped by delivery date for calendar view
      parameters:
        - name: month
          in: query
          schema:
            type: string
            description: "YYYY-MM"
      responses:
        "200":
          description: Calendar entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEntry"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/check-capacity:
    get:
      operationId: checkDeliveryCapacity
      tags: [orders]
      summary: Check if a delivery date/time slot has capacity
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: timeSlot
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Capacity status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapacityStatus"

  # ── Banners ───────────────────────────────────────────────────────────────
  /banners:
    get:
      operationId: listBanners
      tags: [banners]
      summary: List active banners
      responses:
        "200":
          description: List of banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"
    post:
      operationId: createBanner
      tags: [banners]
      summary: Create a banner (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBannerBody"
      responses:
        "201":
          description: Created banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"

  /banners/{id}:
    put:
      operationId: updateBanner
      tags: [banners]
      summary: Update a banner (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBannerBody"
      responses:
        "200":
          description: Updated banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"
    delete:
      operationId: deleteBanner
      tags: [banners]
      summary: Delete a banner (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  # ── Blackout Dates ─────────────────────────────────────────────────────────
  /blackout-dates:
    get:
      operationId: listBlackoutDates
      tags: [blackout-dates]
      summary: List blackout dates
      responses:
        "200":
          description: List of blackout dates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlackoutDate"
    post:
      operationId: createBlackoutDate
      tags: [blackout-dates]
      summary: Create a blackout date (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlackoutDateBody"
      responses:
        "201":
          description: Created blackout date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlackoutDate"

  /blackout-dates/{id}:
    delete:
      operationId: deleteBlackoutDate
      tags: [blackout-dates]
      summary: Delete a blackout date (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  # ── Coupons ────────────────────────────────────────────────────────────────
  /coupons:
    get:
      operationId: listCoupons
      tags: [coupons]
      summary: List all coupons (admin)
      responses:
        "200":
          description: List of coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
    post:
      operationId: createCoupon
      tags: [coupons]
      summary: Create a coupon (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCouponBody"
      responses:
        "201":
          description: Created coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /coupons/validate:
    post:
      operationId: validateCoupon
      tags: [coupons]
      summary: Validate a coupon code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCouponBody"
      responses:
        "200":
          description: Coupon validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponValidation"

  /coupons/{id}:
    delete:
      operationId: deleteCoupon
      tags: [coupons]
      summary: Delete a coupon (admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  # ── Admin Auth ─────────────────────────────────────────────────────────────
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Admin session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Category ──────────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, slug, sortOrder, createdAt]

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        sortOrder:
          type: integer
      required: [name, slug]

    # ── Product ───────────────────────────────────────────────────────────────
    ProductVariant:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          description: "e.g. size, flavor, frosting"
        options:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              priceAdjustment:
                type: number
            required: [label, priceAdjustment]
      required: [name, type, options]

    ProductAddon:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
      required: [name, price]

    Product:
      type: object
      properties:
        id:
          type: integer
        categoryId:
          type: integer
          nullable: true
        category:
          $ref: "#/components/schemas/Category"
          nullable: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        basePrice:
          type: number
        imageUrls:
          type: array
          items:
            type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        addons:
          type: array
          items:
            $ref: "#/components/schemas/ProductAddon"
        allowCustomMessage:
          type: boolean
        isVisible:
          type: boolean
        isAvailable:
          type: boolean
        orderCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, slug, basePrice, imageUrls, variants, addons, allowCustomMessage, isVisible, isAvailable, orderCount, createdAt]

    CreateProductBody:
      type: object
      properties:
        categoryId:
          type: integer
          nullable: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        basePrice:
          type: number
        imageUrls:
          type: array
          items:
            type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        addons:
          type: array
          items:
            $ref: "#/components/schemas/ProductAddon"
        allowCustomMessage:
          type: boolean
        isVisible:
          type: boolean
        isAvailable:
          type: boolean
      required: [name, slug, basePrice]

    # ── Order ─────────────────────────────────────────────────────────────────
    OrderStatus:
      type: string
      enum: [pending, confirmed, in_baking, out_for_delivery, completed, cancelled]

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        productImageUrl:
          type: string
          nullable: true
        quantity:
          type: integer
        unitPrice:
          type: number
        selectedVariants:
          type: object
          additionalProperties:
            type: string
        selectedAddons:
          type: array
          items:
            type: string
        customMessage:
          type: string
          nullable: true
        subtotal:
          type: number
      required: [productId, productName, quantity, unitPrice, selectedVariants, selectedAddons, subtotal]

    Order:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
          nullable: true
        deliveryAddress:
          type: string
        deliveryDate:
          type: string
          format: date
        deliveryTimeSlot:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/OrderStatus"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        subtotal:
          type: number
        discountAmount:
          type: number
        totalAmount:
          type: number
        couponCode:
          type: string
          nullable: true
        whatsappMessageSent:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, customerName, customerPhone, deliveryAddress, deliveryDate, status, items, subtotal, discountAmount, totalAmount, whatsappMessageSent, createdAt]

    CreateOrderBody:
      type: object
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
          nullable: true
        deliveryAddress:
          type: string
        deliveryDate:
          type: string
          format: date
        deliveryTimeSlot:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        couponCode:
          type: string
          nullable: true
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantity:
                type: integer
              selectedVariants:
                type: object
                additionalProperties:
                  type: string
              selectedAddons:
                type: array
                items:
                  type: string
              customMessage:
                type: string
                nullable: true
            required: [productId, quantity, selectedVariants, selectedAddons]
      required: [customerName, customerPhone, deliveryAddress, deliveryDate, items]

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
      required: [status]

    OrdersSummary:
      type: object
      properties:
        totalOrders:
          type: integer
        todayOrders:
          type: integer
        pendingOrders:
          type: integer
        totalRevenue:
          type: number
        todayRevenue:
          type: number
        statusBreakdown:
          type: array
          items:
            type: object
            properties:
              status:
                $ref: "#/components/schemas/OrderStatus"
              count:
                type: integer
            required: [status, count]
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required: [totalOrders, todayOrders, pendingOrders, totalRevenue, todayRevenue, statusBreakdown, recentOrders]

    CalendarEntry:
      type: object
      properties:
        date:
          type: string
          format: date
        orderCount:
          type: integer
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required: [date, orderCount, orders]

    CapacityStatus:
      type: object
      properties:
        available:
          type: boolean
        remainingSlots:
          type: integer
        isBlackout:
          type: boolean
      required: [available, remainingSlots, isBlackout]

    # ── Banner ─────────────────────────────────────────────────────────────────
    Banner:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        imageUrl:
          type: string
        linkUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, title, imageUrl, isActive, sortOrder, createdAt]

    CreateBannerBody:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        imageUrl:
          type: string
        linkUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
      required: [title, imageUrl]

    # ── Blackout Date ──────────────────────────────────────────────────────────
    BlackoutDate:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        reason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, date, createdAt]

    CreateBlackoutDateBody:
      type: object
      properties:
        date:
          type: string
          format: date
        reason:
          type: string
          nullable: true
      required: [date]

    # ── Coupon ─────────────────────────────────────────────────────────────────
    Coupon:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
        minOrderAmount:
          type: number
          nullable: true
        maxUses:
          type: integer
          nullable: true
        usedCount:
          type: integer
        isActive:
          type: boolean
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, code, discountType, discountValue, usedCount, isActive, createdAt]

    CreateCouponBody:
      type: object
      properties:
        code:
          type: string
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
        minOrderAmount:
          type: number
          nullable: true
        maxUses:
          type: integer
          nullable: true
        isActive:
          type: boolean
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required: [code, discountType, discountValue]

    ValidateCouponBody:
      type: object
      properties:
        code:
          type: string
        orderAmount:
          type: number
      required: [code, orderAmount]

    CouponValidation:
      type: object
      properties:
        valid:
          type: boolean
        coupon:
          $ref: "#/components/schemas/Coupon"
          nullable: true
        discountAmount:
          type: number
        message:
          type: string
      required: [valid, discountAmount, message]

    # ── Admin ──────────────────────────────────────────────────────────────────
    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
      required: [password]

    AdminLoginResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
