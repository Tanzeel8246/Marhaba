kind = "slides"
previewPath = "/bdp-presentation/"
title = "Bake Delight Pro — Technical Presentation"
version = "1.0.0"
id = "artifacts/bdp-presentation"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/bdp-presentation/" ]
localPort = 18810

[services.development]
run = "pnpm --filter @workspace/bdp-presentation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bdp-presentation", "run", "build" ]
publicDir = "artifacts/bdp-presentation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18810"
BASE_PATH = "/bdp-presentation/"
