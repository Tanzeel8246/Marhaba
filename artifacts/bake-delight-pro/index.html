<!DOCTYPE html>
<html lang="ur" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>مرحبا سویٹس اینڈ بیکرز</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Force clear local storage and session storage once to fix corrupt state
      const cleared = localStorage.getItem('app_force_cleared_v2');
      if (!cleared) {
        localStorage.clear();
        sessionStorage.clear();
        localStorage.setItem('app_force_cleared_v2', 'true');
        window.location.reload();
      }

      // Force unregister all service workers immediately to fix stale cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }

      // Handle chunk loading errors but prevent infinite reload loops
      window.addEventListener('vite:preloadError', (event) => {
        const hasReloaded = sessionStorage.getItem('sw_reloaded');
        if (!hasReloaded) {
          sessionStorage.setItem('sw_reloaded', 'true');
          window.location.reload();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
