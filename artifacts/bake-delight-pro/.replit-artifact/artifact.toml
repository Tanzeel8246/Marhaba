kind = "web"
previewPath = "/"
title = "مرحبا سویٹس اینڈ بیکرز"
version = "1.0.0"
id = "artifacts/bake-delight-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18861

[services.development]
run = "pnpm --filter @workspace/bake-delight-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bake-delight-pro", "run", "build" ]
publicDir = "artifacts/bake-delight-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18861"
BASE_PATH = "/"
